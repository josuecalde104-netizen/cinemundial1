<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:
  linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,1)),
  url('https://images.unsplash.com/photo-1448375240586-882707db888b') center/cover no-repeat fixed;
  color:white;
  overflow-x:hidden;
}

#snow{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  pointer-events:none;
}

main{
  position:relative;
  z-index:2;
}

header{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

.logo{
  color:red;
  font-weight:bold;
  font-size:28px;
  text-shadow:0 0 15px red;
}

.hero{
  height:35vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero h1{
  font-size:45px;
}

.container{
  padding:20px;
}

/* 🎬 CATÁLOGO */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}

.card{
  position:relative;
  height:240px;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.4s;
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card:hover{
  transform:scale(1.08);
}

.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:linear-gradient(transparent, black);
}

.card::after{
  content:"▶";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:35px;
  opacity:0;
  transition:.3s;
}

.card:hover::after{
  opacity:1;
}

/* 🔴 ANUNCIOS */
.banner{
  display:flex;
  justify-content:center;
  margin:15px 0;
}
</style>
</head>

<script>

  {titulo:"Son como niños",img:"img/2.jpg",link:"https://vix.com"},
  {titulo:"El Orfanato",img:"img/3.jpg",link:"https://vix.com"},

  {titulo:"¿Quieres ser mi hijo?",img:"img/8.jpg",link:"https://vix.com"},
  {titulo:"Scary Movie",img:"img/9.jpg",link:"https://vix.com"},
  {titulo:"Tonta pero no tanto",img:"img/10.jpg",link:"https://tubitv.com/movies/100054553/tonta-tonta-pero-no-tanto"},
  {titulo:"Miedo profundo",img:"img/11.jpg",link:"https://tubitv.com/movies/588234/miedo-profundo-doblado"},
  {titulo:"Muñeca de payaso",img:"img/12.jpg",link:"https://tubitv.com/movies/686275/mu-eca-de-payaso-doblado"},
  {titulo:"Hansel y Gretel",img:"img/13.jpg",link:"https://tubitv.com/movies/536449/hansel-and-gretel-doblado"},
  {titulo:"Lechuza",img:"img/14.jpg",link:"https://tubitv.com/movies/100043856/lechuza"},
  {titulo:"Batalla de Bestias",img:"img/15.jpg",link:"https://tubitv.com/movies/100043258/la-batalla-de-las-bestias"},
  {titulo:"Megalodon",img:"img/16.jpg",link:"https://tubitv.com/movies/100041547/megalodon"},
  {titulo:"Robocop",img:"img/17.jpg",link:"https://tubitv.com/series/300009288/robocop-the-series-espa-ol"},
  {titulo:"La leyenda del rey mono",img:"img/18.jpg",link:"https://tubitv.com/movies/666870/la-leyenda-del-rey-mono-el-regreso-del-h-roe-doblado"},
  {titulo:"La serie de la pandilla de Sugar Creek",img:"img/19.jpg",link:"https://tubitv.com/tv-shows/200014205/s01-e01-race-against-nightfall"},
  {titulo:"El transportador 3",img:"img/20.jpg",link:"https://tubitv.com/movies/100044388/el-transportador-3"},
  {titulo:"Terror a 47 Metros: El Segundo Ataque",img:"img/21.jpg",link:"https://tubitv.com/movies/100056971/terror-a-47-metros-el-segundo-ataque"},
  {titulo:"Abismo Estelar",img:"img/22.jpg",link:"https://tubitv.com/movies/100041198/abismo-estelar"},
  {titulo:"La sirenita",img:"23.jpeg",link:"https://tubitv.com/movies/678550/la-sirenita-doblado"}
];

let grid = document.getElementById("grid");

function render(){
  grid.innerHTML="";
  peliculas.sort(()=>Math.random()-0.5).forEach(p=>{
    grid.innerHTML += `
    <div class="card" onclick="window.open('${p.link}','_blank')">
      <img src="${p.img}">
      <div class="overlay">
        <h3>${p.titulo}</h3>
      </div>
    </div>`;
  });
}

render();

/* ❄️ NIEVE */
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

let snowflakes = [];

for(let i=0;i<60;i++){
  snowflakes.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*3+1,
    d:Math.random()*1
  });
}

function drawSnow(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  ctx.beginPath();

  snowflakes.forEach(f=>{
    ctx.moveTo(f.x,f.y);
    ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true);
  });

  ctx.fill();

  snowflakes.forEach(f=>{
    f.y += f.d + 0.5;

    if(f.y > canvas.height){
      f.y = 0;
      f.x = Math.random()*canvas.width;
    }
  });
}

setInterval(drawSnow,30);
</script>
