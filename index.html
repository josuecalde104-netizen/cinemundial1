<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

:root{
  --red:#ff1f1f;
  --bg:#050505;
  --card:#111111;
  --soft:#1b1b1b;
  --text:#ffffff;
  --gray:#bdbdbd;
}

html{
  scroll-behavior:smooth;
}

body{
  background:
  linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.96)),
  url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1974&auto=format&fit=crop') center/cover fixed;
  color:var(--text);
  overflow-x:hidden;
}

/* ===== SCROLL ===== */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:var(--red);
  border-radius:20px;
}

/* ===== NIEVE ===== */

#snow{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  pointer-events:none;
}

/* ===== HEADER ===== */

header{
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter:blur(14px);
  background:rgba(0,0,0,.55);
  border-bottom:1px solid rgba(255,255,255,.05);
}

.nav{
  max-width:1450px;
  margin:auto;
  padding:16px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
}

.logo{
  font-size:30px;
  font-weight:700;
  color:var(--red);
  text-shadow:0 0 18px rgba(255,0,0,.7);
}

.search-box{
  width:320px;
  max-width:100%;
}

.search{
  width:100%;
  padding:12px 18px;
  border:none;
  outline:none;
  border-radius:50px;
  background:rgba(255,255,255,.08);
  color:white;
  font-size:14px;
  backdrop-filter:blur(10px);
}

.search::placeholder{
  color:#d2d2d2;
}

.search:focus{
  box-shadow:0 0 0 2px rgba(255,0,0,.3);
}

/* ===== HERO ===== */

.hero{
  min-height:40vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
}

.hero-content{
  max-width:850px;
}

.hero h1{
  font-size:68px;
  margin-bottom:16px;
  line-height:1.1;
  text-shadow:0 0 25px rgba(0,0,0,.8);
}

.hero p{
  color:var(--gray);
  font-size:18px;
}

/* ===== ADS ===== */

.ads-wrapper{
  max-width:1450px;
  margin:auto;
  padding:0 20px 30px;
}

.ads-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:18px;
}

.ad-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.05);
  border-radius:22px;
  padding:15px;
  min-height:100px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  backdrop-filter:blur(10px);
}

/* ===== SECTION ===== */

.section{
  max-width:1450px;
  margin:auto;
  padding:20px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
}

.section-title h2{
  font-size:30px;
}

.movies-count{
  color:#a7a7a7;
  font-size:14px;
}

/* ===== GRID ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:24px;
}

.card{
  background:var(--card);
  border-radius:24px;
  overflow:hidden;
  transition:.35s;
  box-shadow:0 12px 28px rgba(0,0,0,.45);
}

.card:hover{
  transform:translateY(-8px);
}

.poster{
  position:relative;
  height:310px;
  overflow:hidden;
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.45s;
}

.card:hover img{
  transform:scale(1.08);
}

.poster::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.97),transparent 55%);
  z-index:1;
}

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  background:rgba(255,0,0,.92);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  z-index:2;
  opacity:0;
  transition:.3s;
  box-shadow:0 0 25px rgba(255,0,0,.5);
}

.card:hover .play{
  opacity:1;
}

.info{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  z-index:2;
  padding:18px;
}

.info h3{
  font-size:16px;
  margin-bottom:12px;
  line-height:1.35;
}

.watch-btn{
  width:100%;
  border:none;
  padding:11px;
  border-radius:14px;
  background:linear-gradient(45deg,#ff0000,#ff3b3b);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
  font-size:14px;
}

.watch-btn:hover{
  transform:scale(1.03);
  opacity:.92;
}

/* ===== FOOTER ===== */

footer{
  margin-top:45px;
  padding:28px;
  text-align:center;
  color:#888;
  background:rgba(0,0,0,.5);
  border-top:1px solid rgba(255,255,255,.05);
}

/* ===== RESPONSIVE ===== */

@media(max-width:850px){

  .hero h1{
    font-size:48px;
  }

}

@media(max-width:600px){

  .nav{
    flex-direction:column;
  }

  .hero{
    min-height:35vh;
  }

  .hero h1{
    font-size:36px;
  }

  .hero p{
    font-size:15px;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
    gap:16px;
  }

  .poster{
    height:250px;
  }

}

</style>

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const moviesCount = document.getElementById("moviesCount");

function render(lista){

  grid.innerHTML = "";

  moviesCount.innerText = lista.length + " películas";

  lista.forEach(p=>{

    let plataforma = "📲 Abrir App";

    if(p.link.includes("tubitv")){
      plataforma = "▶ Ver en Tubi";
    }

    else if(p.link.includes("vix")){
      plataforma = "▶ Ver en ViX";
    }

    else if(p.link.includes("canela")){
      plataforma = "▶ Ver en Canela TV";
    }

    grid.innerHTML += `

    <div class="card">

      <div class="poster">

        <img src="${p.img}" loading="lazy">

        <div class="play">▶</div>

        <div class="info">

          <h3>${p.titulo}</h3>

          <button class="watch-btn"
          onclick="window.open('${p.link}','_blank')">

            ${plataforma}

          </button>

        </div>

      </div>

    </div>

    `;

  });

}

render(peliculas);

search.addEventListener("input", ()=>{

  let texto = search.value.toLowerCase();

  let filtradas = peliculas.filter(p =>
    p.titulo.toLowerCase().includes(texto)
  );

  render(filtradas);

});

const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

function resize(){

  canvas.width = innerWidth;
  canvas.height = innerHeight;

}

resize();

window.addEventListener("resize", resize);

let snowflakes = [];

for(let i=0;i<70;i++){

  snowflakes.push({

    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*3+1,
    d:Math.random()*1

  });

}

function drawSnow(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";

  ctx.beginPath();

  snowflakes.forEach(f=>{

    ctx.moveTo(f.x,f.y);

    ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true);

  });

  ctx.fill();

  snowflakes.forEach(f=>{

    f.y += f.d + 0.6;

    if(f.y > canvas.height){

      f.y = 0;
      f.x = Math.random()*canvas.width;

    }

  });

}

setInterval(drawSnow,30);
